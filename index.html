    <style>
      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #FAFAFA;
        z-index: 9999;
        transition: opacity 0.5s ease-out, visibility 0.5s;
      }
      .loader-spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #f3f3f3;
        border-top: 4px solid #ea580c;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .loaded #initial-loader {
        opacity: 0;
        visibility: hidden;
      }
    </style>

    <noscript>
      <div style="text-align: center; padding: 20px; font-family: sans-serif;">
        <h1>JavaScript Necessário</h1>
        <p>Por favor, ative o JavaScript no seu navegador para visualizar este site corretamente.</p>
      </div>
    </noscript>
    <script>
      // Global error handler to catch early JS errors and provide a fallback
      window.onerror = function(message, source, lineno, colno, error) {
        console.error('Global Error:', message, 'at', source, ':', lineno);
        var root = document.getElementById('root');
        if (root && !root.innerHTML.trim()) {
          root.innerHTML = '<div style="text-align: center; padding: 50px; font-family: sans-serif; color: #333;">' +
            '<h2 style="color: #ea580c;">Ops! Algo deu errado.</h2>' +
            '<p>Não conseguimos carregar a página corretamente no seu navegador.</p>' +
            '<button onclick="window.location.reload()" style="padding: 10px 20px; background: #ea580c; color: white; border: none; border-radius: 20px; cursor: pointer;">Tentar Novamente</button>' +
            '</div>';
        }
        return false;
      };
    </script>
    <div id="initial-loader">
      <div class="loader-spinner"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
